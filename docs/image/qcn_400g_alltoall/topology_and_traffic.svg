<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; }
      .title { font: 700 26px Arial, "Noto Sans CJK SC", sans-serif; fill: #102a43; }
      .subtitle { font: 16px Arial, "Noto Sans CJK SC", sans-serif; fill: #486581; }
      .label { font: 15px Arial, "Noto Sans CJK SC", sans-serif; fill: #243b53; }
      .small { font: 13px Arial, "Noto Sans CJK SC", sans-serif; fill: #52606d; }
      .tiny { font: 12px Arial, "Noto Sans CJK SC", sans-serif; fill: #627d98; }
      .host { fill: #eef2ff; stroke: #4355b9; stroke-width: 2; }
      .switch { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2.5; }
      .link { stroke: #334e68; stroke-width: 4; stroke-linecap: round; }
      .rate-low { stroke: #2f855a; fill: #2f855a; }
      .rate-mid { stroke: #b7791f; fill: #b7791f; }
      .rate-high { stroke: #c53030; fill: #c53030; }
      .muted-line { stroke: #d9e2ec; stroke-width: 1; }
      .cell { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1; }
      .cell-low { fill: #e6ffef; }
      .cell-mid { fill: #fff7e6; }
      .cell-high { fill: #ffecec; }
    </style>
    <marker id="arrow-low" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" class="rate-low"/>
    </marker>
    <marker id="arrow-mid" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" class="rate-mid"/>
    </marker>
    <marker id="arrow-high" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" class="rate-high"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="680"/>
  <text class="title" x="40" y="48">400G 单交换机 all-to-all 实验场景</text>
  <text class="subtitle" x="40" y="76">4 台主机接入 1 台交换机；每条 host-switch 链路 400Gbps、单向传播延迟 4us、共享缓存 82MB</text>

  <rect class="panel" x="38" y="108" width="560" height="520" rx="8"/>
  <text class="label" x="62" y="142">拓扑与链路参数</text>

  <line class="link" x1="318" y1="302" x2="178" y2="188"/>
  <line class="link" x1="318" y1="302" x2="458" y2="188"/>
  <line class="link" x1="318" y1="302" x2="178" y2="438"/>
  <line class="link" x1="318" y1="302" x2="458" y2="438"/>

  <rect class="switch" x="248" y="256" width="140" height="92" rx="8"/>
  <text class="label" x="286" y="293">Switch</text>
  <text class="small" x="292" y="318">node 0</text>

  <rect class="host" x="88" y="140" width="180" height="86" rx="8"/>
  <text class="label" x="139" y="175">Host 1</text>
  <text class="small" x="133" y="198">10.0.1.x</text>

  <rect class="host" x="368" y="140" width="180" height="86" rx="8"/>
  <text class="label" x="419" y="175">Host 2</text>
  <text class="small" x="413" y="198">10.0.2.x</text>

  <rect class="host" x="88" y="400" width="180" height="86" rx="8"/>
  <text class="label" x="139" y="435">Host 3</text>
  <text class="small" x="133" y="458">10.0.3.x</text>

  <rect class="host" x="368" y="400" width="180" height="86" rx="8"/>
  <text class="label" x="419" y="435">Host 4</text>
  <text class="small" x="413" y="458">10.0.4.x</text>

  <text class="tiny" x="99" y="282">400Gbps / 4us</text>
  <text class="tiny" x="415" y="282">400Gbps / 4us</text>
  <text class="tiny" x="98" y="366">400Gbps / 4us</text>
  <text class="tiny" x="416" y="366">400Gbps / 4us</text>

  <rect x="68" y="530" width="20" height="12" class="rate-low" rx="2"/>
  <text class="small" x="96" y="541">4Gbps 初始速率</text>
  <rect x="230" y="530" width="20" height="12" class="rate-mid" rx="2"/>
  <text class="small" x="258" y="541">200Gbps 初始速率</text>
  <rect x="416" y="530" width="20" height="12" class="rate-high" rx="2"/>
  <text class="small" x="444" y="541">400Gbps 初始速率</text>
  <text class="tiny" x="68" y="574">所有流大小均为 100,000,000B，开始时间均为 40us，payload 为 4000B。</text>

  <rect class="panel" x="626" y="108" width="514" height="520" rx="8"/>
  <text class="label" x="650" y="142">12 条单向流量矩阵</text>
  <text class="small" x="650" y="168">表格中的数值为每条流的初始发送速率。</text>

  <g transform="translate(666 206)">
    <rect class="cell" x="0" y="0" width="88" height="52"/>
    <rect class="cell" x="88" y="0" width="88" height="52"/>
    <rect class="cell" x="176" y="0" width="88" height="52"/>
    <rect class="cell" x="264" y="0" width="88" height="52"/>
    <rect class="cell" x="352" y="0" width="88" height="52"/>
    <text class="small" x="22" y="31">src \ dst</text>
    <text class="label" x="124" y="31">H1</text>
    <text class="label" x="212" y="31">H2</text>
    <text class="label" x="300" y="31">H3</text>
    <text class="label" x="388" y="31">H4</text>

    <rect class="cell" x="0" y="52" width="88" height="64"/>
    <text class="label" x="33" y="91">H1</text>
    <rect class="cell" x="88" y="52" width="88" height="64"/>
    <text class="tiny" x="119" y="89">-</text>
    <rect class="cell cell-mid" x="176" y="52" width="88" height="64"/>
    <text class="label" x="194" y="84">200G</text>
    <text class="tiny" x="191" y="104">flow 10003</text>
    <rect class="cell cell-mid" x="264" y="52" width="88" height="64"/>
    <text class="label" x="282" y="84">200G</text>
    <text class="tiny" x="279" y="104">flow 10006</text>
    <rect class="cell cell-low" x="352" y="52" width="88" height="64"/>
    <text class="label" x="377" y="84">4G</text>
    <text class="tiny" x="367" y="104">flow 10009</text>

    <rect class="cell" x="0" y="116" width="88" height="64"/>
    <text class="label" x="33" y="155">H2</text>
    <rect class="cell cell-low" x="88" y="116" width="88" height="64"/>
    <text class="label" x="113" y="148">4G</text>
    <text class="tiny" x="103" y="168">flow 10000</text>
    <rect class="cell" x="176" y="116" width="88" height="64"/>
    <text class="tiny" x="207" y="153">-</text>
    <rect class="cell cell-mid" x="264" y="116" width="88" height="64"/>
    <text class="label" x="282" y="148">200G</text>
    <text class="tiny" x="279" y="168">flow 10007</text>
    <rect class="cell cell-mid" x="352" y="116" width="88" height="64"/>
    <text class="label" x="370" y="148">200G</text>
    <text class="tiny" x="367" y="168">flow 10010</text>

    <rect class="cell" x="0" y="180" width="88" height="64"/>
    <text class="label" x="33" y="219">H3</text>
    <rect class="cell cell-low" x="88" y="180" width="88" height="64"/>
    <text class="label" x="113" y="212">4G</text>
    <text class="tiny" x="103" y="232">flow 10001</text>
    <rect class="cell cell-mid" x="176" y="180" width="88" height="64"/>
    <text class="label" x="194" y="212">200G</text>
    <text class="tiny" x="191" y="232">flow 10004</text>
    <rect class="cell" x="264" y="180" width="88" height="64"/>
    <text class="tiny" x="295" y="217">-</text>
    <rect class="cell cell-mid" x="352" y="180" width="88" height="64"/>
    <text class="label" x="370" y="212">200G</text>
    <text class="tiny" x="367" y="232">flow 10011</text>

    <rect class="cell" x="0" y="244" width="88" height="64"/>
    <text class="label" x="33" y="283">H4</text>
    <rect class="cell cell-high" x="88" y="244" width="88" height="64"/>
    <text class="label" x="105" y="276">400G</text>
    <text class="tiny" x="103" y="296">flow 10002</text>
    <rect class="cell cell-low" x="176" y="244" width="88" height="64"/>
    <text class="label" x="201" y="276">4G</text>
    <text class="tiny" x="191" y="296">flow 10005</text>
    <rect class="cell cell-low" x="264" y="244" width="88" height="64"/>
    <text class="label" x="289" y="276">4G</text>
    <text class="tiny" x="279" y="296">flow 10008</text>
    <rect class="cell" x="352" y="244" width="88" height="64"/>
    <text class="tiny" x="383" y="281">-</text>
  </g>

  <text class="small" x="650" y="560">论文使用方式：这张图放在实验设置部分，先说明拓扑与链路，再说明 all-to-all 矩阵中存在 4G/200G/400G 的非对称注入。</text>
  <text class="small" x="650" y="586">读图结论：这是一个小规模但负载结构完整的 400G 交换机场景，可用于验证共享缓存、ECN、QCN 和 PFC 的端到端闭环。</text>
</svg>
